<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Segoe UI, system-ui, sans-serif;
            background: #101010;
            color: #fff;
        }
        .card {
            width: min(420px, calc(100vw - 2rem));
            background: #202020;
            border-radius: 0.35em;
            padding: 1.5rem;
            box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.35);
        }
        h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
        p { margin: 0 0 1rem; color: #bbb; }
        label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.9rem; }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 0.65rem 0.75rem;
            border: 1px solid #444;
            border-radius: 0.25em;
            background: #181818;
            color: #fff;
        }
        button {
            margin-top: 1.25rem;
            width: 100%;
            padding: 0.75rem;
            border: 0;
            border-radius: 0.25em;
            background: #00a4dc;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: default; }
        .message { margin-top: 1rem; min-height: 1.25rem; }
        .message.error { color: #ff867c; }
        .message.success { color: #81c784; }
        .links { margin-top: 1rem; text-align: center; }
        a { color: #00a4dc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Forgot password</h1>
        <p>Enter your username or email address. If an account exists, we will email a reset link.</p>
        <form id="forgotForm">
            <label for="usernameOrEmail">Username or email</label>
            <input id="usernameOrEmail" name="usernameOrEmail" autocomplete="username" required />

            <button type="submit" id="submitBtn">Send reset link</button>
        </form>
        <div id="message" class="message" role="status"></div>
        <div class="links">
            <a href="/web/index.html#!/login.html">Back to sign in</a>
        </div>
    </div>
    <script>
        const form = document.getElementById('forgotForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            message.textContent = '';
            message.className = 'message';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/AccountPortal/Public/ForgotPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        UsernameOrEmail: document.getElementById('usernameOrEmail').value
                    })
                });

                const result = await response.json();
                message.textContent = result.message || result.Message || 'Request failed.';
                message.className = 'message ' + (result.success || result.Success ? 'success' : 'error');

                if (result.success || result.Success) {
                    form.reset();
                }
            } catch (error) {
                message.textContent = 'Could not submit the form.';
                message.className = 'message error';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
