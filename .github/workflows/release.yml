name: Release Plugins

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (e.g. 1.0.0.6)"
        required: true
        default: "1.0.0.10"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.MenuLinks.sln --configuration Release -f net8.0
          dotnet build Jellyfin.Plugin.MenuLinks.sln --configuration Release -f net9.0

      - name: Package plugin zips
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          mkdir -p dist

          package_plugin() {
            local SLUG="$1"
            local GUID="$2"
            local NAME="$3"
            local OVERVIEW="$4"
            local DESCRIPTION="$5"
            local PROJECT="$6"
            local ASSEMBLY="$7"
            local ABI="$8"
            local FRAMEWORK="$9"

            local PACKAGE_DIR="dist/${SLUG}-${ABI}"
            local ZIP_NAME="${SLUG}_${VERSION}_${ABI}.zip"

            mkdir -p "${PACKAGE_DIR}"
            cp "${PROJECT}/bin/Release/${FRAMEWORK}/${ASSEMBLY}" "${PACKAGE_DIR}/"

            cat > "${PACKAGE_DIR}/meta.json" <<EOF
          {
            "guid": "${GUID}",
            "name": "${NAME}",
            "overview": "${OVERVIEW}",
            "description": "${DESCRIPTION}",
            "owner": "pcmodder2001",
            "category": "General",
            "version": "${VERSION}",
            "targetAbi": "${ABI}.0.0",
            "changelog": "Release ${VERSION}",
            "timestamp": "${TIMESTAMP}",
            "status": "Active",
            "autoUpdate": true,
            "assemblies": ["${ASSEMBLY}"]
          }
          EOF

            (cd "${PACKAGE_DIR}" && zip -r "../${ZIP_NAME}" .)
            md5sum "dist/${ZIP_NAME}" | awk '{print $1}' > "dist/${ZIP_NAME}.md5"
          }

          for ABI_FRAMEWORK in "10.10 net8.0" "10.11 net9.0"; do
            ABI="${ABI_FRAMEWORK%% *}"
            FRAMEWORK="${ABI_FRAMEWORK##* }"

            package_plugin \
              "custom-menu-links" \
              "a3f8c2e1-7b4d-4a9e-8f1c-2d6e9a0b4c5f" \
              "Custom Menu Links" \
              "Manage custom Jellyfin Web side menu links from the dashboard" \
              "Provides a simple dashboard UI for adding, editing, and reordering custom side menu links in Jellyfin Web. Changes are written to the web client config.json automatically." \
              "Jellyfin.Plugin.MenuLinks" \
              "Jellyfin.Plugin.MenuLinks.dll" \
              "${ABI}" \
              "${FRAMEWORK}"

            package_plugin \
              "custom-login-buttons" \
              "b7e4d1a2-8c3f-4b6e-9d2a-1f0c5e8b6d3a" \
              "Custom Login Buttons" \
              "Add sign-up and custom forgot-password buttons to the Jellyfin login page" \
              "Configure a sign-up button and replace the default forgot-password button with a custom URL. Ideal for jfa-go and similar account management tools." \
              "Jellyfin.Plugin.LoginButtons" \
              "Jellyfin.Plugin.LoginButtons.dll" \
              "${ABI}" \
              "${FRAMEWORK}"

            package_plugin \
              "account-portal" \
              "c9e6f3c4-8d5b-4a2f-9e0c-3b1a7d8e5f2b" \
              "Account Portal" \
              "Open signup and email password reset for Jellyfin" \
              "Enable self-service account registration with auto-enabled users and email-based password reset links on the login page." \
              "Jellyfin.Plugin.AccountPortal" \
              "Jellyfin.Plugin.AccountPortal.dll" \
              "${ABI}" \
              "${FRAMEWORK}"
          done

      - name: Update manifest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          git fetch origin "${DEFAULT_BRANCH}"
          git show "origin/${DEFAULT_BRANCH}:manifest.json" > manifest.json

          add_manifest_entry() {
            local GUID="$1"
            local SLUG="$2"
            local ABI="$3"
            local CHANGELOG="$4"
            local ZIP_NAME="${SLUG}_${VERSION}_${ABI}.zip"
            local CHECKSUM="$(cat "dist/${ZIP_NAME}.md5")"
            local SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_NAME}"

            jq --arg guid "${GUID}" \
               --arg version "${VERSION}" \
               --arg checksum "${CHECKSUM}" \
               --arg sourceUrl "${SOURCE_URL}" \
               --arg timestamp "${TIMESTAMP}" \
               --arg targetAbi "${ABI}.0.0" \
               --arg changelog "${CHANGELOG}" \
               '
              map(
                if .guid == $guid then
                  .versions = [{version: $version, changelog: $changelog, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}]
                else .
                end
              )
              ' manifest.json > manifest.tmp
            mv manifest.tmp manifest.json
          }

          add_manifest_entry \
            "a3f8c2e1-7b4d-4a9e-8f1c-2d6e9a0b4c5f" \
            "custom-menu-links" \
            "10.11" \
            "Release ${VERSION} for Jellyfin 10.11"

          add_manifest_entry \
            "b7e4d1a2-8c3f-4b6e-9d2a-1f0c5e8b6d3a" \
            "custom-login-buttons" \
            "10.11" \
            "Release ${VERSION} for Jellyfin 10.11"

          add_manifest_entry \
            "c9e6f3c4-8d5b-4a2f-9e0c-3b1a7d8e5f2b" \
            "account-portal" \
            "10.11" \
            "Release ${VERSION} for Jellyfin 10.11"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Jellyfin Plugins ${{ steps.version.outputs.version }}
          files: |
            manifest.json
            dist/custom-menu-links_${{ steps.version.outputs.version }}_10.10.zip
            dist/custom-menu-links_${{ steps.version.outputs.version }}_10.10.zip.md5
            dist/custom-menu-links_${{ steps.version.outputs.version }}_10.11.zip
            dist/custom-menu-links_${{ steps.version.outputs.version }}_10.11.zip.md5
            dist/custom-login-buttons_${{ steps.version.outputs.version }}_10.10.zip
            dist/custom-login-buttons_${{ steps.version.outputs.version }}_10.10.zip.md5
            dist/custom-login-buttons_${{ steps.version.outputs.version }}_10.11.zip
            dist/custom-login-buttons_${{ steps.version.outputs.version }}_10.11.zip.md5
            dist/account-portal_${{ steps.version.outputs.version }}_10.10.zip
            dist/account-portal_${{ steps.version.outputs.version }}_10.10.zip.md5
            dist/account-portal_${{ steps.version.outputs.version }}_10.11.zip
            dist/account-portal_${{ steps.version.outputs.version }}_10.11.zip.md5
          generate_release_notes: true

      - name: Commit updated manifest
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_TMP="$(mktemp)"
          cp manifest.json "$MANIFEST_TMP"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout "${DEFAULT_BRANCH}"
          cp "$MANIFEST_TMP" manifest.json

          git add manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json unchanged"
            exit 0
          fi

          git commit -m "chore(repo): update manifest for ${{ steps.version.outputs.version }}"
          git push origin "${DEFAULT_BRANCH}"

      - name: Purge jsDelivr cache
        shell: bash
        run: |
          curl -fsS -X GET "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/manifest.json" || true
